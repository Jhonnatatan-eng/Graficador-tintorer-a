<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
html,body{height:100%;background:#1a1a2e}
#lock{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:9999;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)}
.lock-box{background:rgba(255,255,255,.06);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:40px 35px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lock-box h1{color:#e94560;font-size:28px;margin-bottom:6px;letter-spacing:2px}
.lock-box .sub{color:rgba(255,255,255,.5);font-size:11px;margin-bottom:28px;letter-spacing:1px}
.lock-box input{width:100%;padding:14px 16px;font-size:16px;border:2px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.07);color:white;text-align:center;letter-spacing:3px;outline:none;transition:border-color .3s}
.lock-box input:focus{border-color:#e94560}
.lock-box input::placeholder{color:rgba(255,255,255,.25);letter-spacing:1px}
.lock-box button{width:100%;padding:14px;font-size:14px;font-weight:700;cursor:pointer;border:none;border-radius:8px;margin-top:16px;background:#e94560;color:white;letter-spacing:1px;transition:transform .15s,background .3s}
.lock-box button:hover{background:#c73e54;transform:scale(1.02)}
#lock-err{color:#ff6b6b;font-size:12px;margin-top:12px;min-height:18px;transition:opacity .3s}
.lock-box .footer{color:rgba(255,255,255,.2);font-size:9px;margin-top:24px;letter-spacing:.5px}
#admin-view{display:none;position:fixed;inset:0;z-index:9998;background:#222;padding:10px;overflow:auto}
#admin-view textarea{width:100%;height:calc(100vh - 80px);font-family:'Courier New',monospace;font-size:11px;background:#1a1a1a;color:#0f0;border:1px solid #444;padding:10px;resize:none}
#admin-bar{display:flex;gap:8px;margin-bottom:8px;align-items:center}
#admin-bar span{color:#0f0;font-size:13px;font-weight:700}
#admin-bar button{padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;border:none;border-radius:4px;color:white}
</style>
</head>

<div id="lock">
<div class="lock-box">
<h1>🔒 TEKSTELAS</h1>
<div class="sub">MANUFACTURAS ELIOT S.A.S</div>
<input type="password" id="pinInput" placeholder="Ingresa PIN" onkeypress="if(event.key==='Enter')unlock()">
<button onclick="unlock()">ACCEDER</button>
<div id="lock-err"></div>
<div class="footer">Sistema protegido · Contactar al administrador</div>
</div>
</div>

<div id="admin-bar">
