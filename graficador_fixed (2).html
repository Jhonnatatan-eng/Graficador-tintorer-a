<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graficador Tekstelas — Manufacturas Eliot S.A.S</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}
html,body{background:#999;height:100%;min-height:100vh}
#app{display:flex;flex-direction:column;height:100vh;padding:5px;gap:3px;background:#999}
#hdr{background:#f0f0f0;border:1px solid #bbb;border-radius:3px;padding:4px 8px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.hf{display:flex;flex-direction:column;gap:1px}
.hf label{font-size:7px;font-weight:700;color:#666;text-transform:uppercase}
.hf input,.hf select{padding:2px 4px;border:1px solid #bbb;border-radius:2px;font-size:10px;background:white}
#h-nom{width:175px;font-size:11px;font-weight:700}
#std-disp{font-size:16px;font-weight:700;color:#c0392b;min-width:52px;letter-spacing:1px}
.vsep{width:1px;background:#ccc;align-self:stretch;margin:0 2px}
.btn-sede{padding:2px 7px;font-size:8px;font-weight:700;cursor:pointer;border:1px solid #999;border-radius:2px;background:#e0e0e0;display:block;margin-bottom:2px}
.btn-sede:hover{background:#ccc}
#sede-tag{font-size:8px;font-weight:700;color:#1a5276;min-width:80px;align-self:center}
.hdr-r{margin-left:auto;display:flex;gap:4px;align-items:center}
.hbtn{padding:4px 10px;font-size:9px;font-weight:700;cursor:pointer;border:none;border-radius:3px;color:white}
#btn-dig{background:#1abc9c}
#btn-exp{background:#27ae60}
#lienzo-wrap{flex:1;position:relative;background:white;border:1px solid #bbb;border-radius:3px;overflow:auto;min-height:0}
#svgC{display:block;background:white}
#zoom-ctrl{position:fixed;bottom:70px;right:12px;display:flex;flex-direction:column;gap:3px;z-index:50}
.zbtn{width:32px;height:32px;font-size:18px;font-weight:700;cursor:pointer;border:1px solid #aaa;border-radius:5px;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;user-select:none;line-height:1;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.zbtn:hover{background:#ddd}
.zbtn:active{background:#bbb}
#panel{background:#ddd;border:1px solid #bbb;border-radius:3px;padding:4px;display:flex;gap:4px;align-items:stretch;flex-shrink:0;overflow-x:auto;min-height:44px}
.pg{display:flex;gap:2px;align-items:center;border-right:1px solid #aaa;padding-right:4px;flex-shrink:0}
.pg:last-child{border-right:none}
.plbl{font-size:7px;font-weight:700;color:#333;text-transform:uppercase;writing-mode:vertical-rl;margin-right:2px;letter-spacing:.4px;user-select:none;background:#fff;padding:2px 1px;border-radius:2px;border:1px solid #ccc}
.bp{padding:5px 8px;font-size:9px;font-weight:700;cursor:pointer;border:1px solid #999;border-radius:3px;background:#fff;white-space:nowrap;line-height:1.1}
.bp:hover{filter:brightness(.88)}
.bp-tr{background:#c0392b;color:#fff;border-color:#922b21}
.bp-ll{background:#2471a3;color:#fff;border-color:#1a5276}
.bp-vc{background:#566573;color:#fff;border-color:#424949}
.bp-ad{background:#1d8348;color:#fff;border-color:#145a32}
.bp-ds{background:#7d3c98;color:#fff;border-color:#5b2c6f}
.bp-enj{background:#1a9db5;color:#fff;border-color:#148a9e}
.bp-op{background:#2e86c1;color:#fff;border-color:#1a5276}
.bp-un{background:#eee;color:#333}
.bp-rs{background:#e74c3c;color:#fff;border-color:#c0392b}
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:300;align-items:center;justify-content:center}
.mov.open{display:flex}
.mbox{background:white;border:2px solid #555;border-radius:5px;padding:13px 15px;min-width:252px;max-width:318px;box-shadow:0 6px 24px rgba(0,0,0,.3)}
.mbox h3{font-size:12px;font-weight:700;margin-bottom:9px;border-bottom:1px solid #ddd;padding-bottom:4px}
.mf{display:flex;flex-direction:column;gap:2px;margin-bottom:7px}
.mf label{font-size:8.5px;font-weight:700;color:#444}
.mf input,.mf select{padding:4px 6px;border:1px solid #bbb;border-radius:2px;font-size:11px}
#qlist{max-height:280px;overflow-y:auto;border:1px solid #ddd;border-radius:2px;margin-bottom:5px}
.qi{padding:3px 7px;cursor:pointer;border-bottom:1px solid #f0f0f0;font-size:10px}
.qi:hover{background:#dff0f8}
.mbts{display:flex;gap:6px;justify-content:flex-end;margin-top:8px}
.mbts button{padding:5px 13px;font-size:10px;font-weight:700;cursor:pointer;border-radius:3px;border:1px solid #aaa}
.bok{background:#27ae60;color:white;border-color:#1e8449}
.bcan{background:#eee}
.prv{font-size:8.5px;color:#444;background:#f5f5f5;padding:4px 6px;border-radius:2px;min-height:14px;margin-top:2px;line-height:1.4}
</style>
</head>
<body>
<div class="mov" id="mo-tr">
<div class="mbox">
  <h3>CIRC / TERMORREGULAR</h3>
  <div class="mf"><label>Temperatura destino °C — dejar vacío para solo circular</label><input type="number" id="tr-t" min="0" max="140"></div>
  <div class="mf"><label>Gradiente °C/min — obligatorio si hay temperatura</label><input type="number" id="tr-g" min="0.1" max="10" step="0.1"></div>
  <div class="mf"><label>Tiempo circular / sostenimiento (min)</label><input type="number" id="tr-s" min="0" value="0"></div>
  <div class="prv" id="tr-prv"></div>
  <div class="mbts"><button class="bcan" onclick="cM('mo-tr')">Cancelar</button><button class="bok" onclick="confTR()">Agregar</button></div>
</div></div>
<div class="mov" id="mo-mx">
<div class="mbox">
  <h3>LLENADO MIXTO</h3>
  <div class="mf"><label>Entre</label><select id="mx-a"><option>W1</option><option>W2</option><option>W3</option><option>T2</option><option>T3</option></select></div>
  <div class="mf"><label>y</label><select id="mx-b"><option>W2</option><option>W1</option><option>W3</option><option>T2</option><option>T3</option></select></div>
  <div class="mbts"><button class="bcan" onclick="cM('mo-mx')">Cancelar</button><button class="bok" onclick="confMX()">Agregar</button></div>
</div></div>
<div class="mov" id="mo-enj">
<div class="mbox">
  <h3>ENJUAGUE</h3>
  <div class="mf"><label>Tipo llenado</label><select id="enj-ll" oninput="prvENJ()"><option>W1</option><option>W2</option><option>W3</option><option>T2</option><option>T3</option></select></div>
  <div class="mf"><label>Temperatura inicial °C (temp actual de la máquina)</label><input type="number" id="enj-ti" min="0" max="140" value="0" oninput="prvENJ()"></div>
  <div class="mf"><label>Temperatura final °C — el lavado solo enfría (0 = no enfría)</label><input type="number" id="enj-temp" min="0" max="140" value="0" oninput="prvENJ()"></div>
  <div class="mf"><label>Gradiente °C/min (solo si hay temperatura final)</label><input type="number" id="enj-grad" min="0" max="10" step="0.1" value="0" oninput="prvENJ()"></div>
  <div class="mf"><label>Tiempo de lavado (min)</label><input type="number" id="enj-sost" min="0" max="300" value="0" oninput="prvENJ()"></div>
  <div class="mf"><label>Tipo vaciado</label><select id="enj-vc"><option>V1</option><option>V2</option><option>V3</option><option>T2</option><option>T3</option><option>PTAR</option></select></div>
  <div class="prv" id="enj-prv">Llenado y vaciado simultáneos (rebose)</div>
  <div class="mbts"><button class="bcan" onclick="cM('mo-enj')">Cancelar</button><button class="bok" onclick="confENJ()">Agregar</button></div>
</div></div>
<div class="mov" id="mo-ad">
<div class="mbox" style="max-width:330px">
  <h3 id="ad-ttl">INTRODUCCIÓN</h3>
  <div class="mf"><label>Buscar producto</label><input type="text" id="ad-srch" oninput="filtQ()" autocomplete="off"></div>
  <div id="qlist"></div>
  <div class="mf" id="ad-tw" style="display:none"><label>Tiempo dosificación (min)</label><input type="number" id="ad-time" min="1" max="120" value="10"></div>
  <div class="mf" id="ad-pw" style="display:none"><label>Progresión (%)</label><input type="number" id="ad-prog" min="0" max="100"></div>
  <div class="prv" id="ad-prv"></div>
  <div class="mbts"><button class="bcan" onclick="cM('mo-ad')">Cancelar</button><button class="bok" onclick="confAD()">Agregar</button></div>
</div></div>
<div class="mov" id="mo-sede">
<div class="mbox" style="min-width:185px">
  <h3>Calle 80 — Bodega</h3>
  <div style="display:flex;flex-direction:column;gap:5px;margin-top:5px">
    <button class="bok" style="padding:9px;font-size:12px" onclick="setBodega('Bodega 4')">Bodega 4</button>
    <button class="bok" style="padding:9px;font-size:12px;background:#e67e22;border-color:#ca6f1e" onclick="setBodega('Bodega 11')">Bodega 11</button>
  </div>
  <div class="mbts"><button class="bcan" onclick="cM('mo-sede')">Cancelar</button></div>
</div></div>

<div id="app">
  <div id="hdr">
    <div class="hf"><label>Nombre receta</label><input type="text" id="h-nom" oninput="dibujar()"></div>
    <div class="vsep"></div>
    <div class="hf"><label>Número</label><input type="text" id="h-num" style="width:50px" oninput="dibujar()"></div>
    <div class="hf"><label>Versión</label><input type="text" id="h-ver" style="width:36px" oninput="dibujar()"></div>
    <div class="hf"><label>Tipo</label><select id="h-tipo" style="width:58px" oninput="dibujar()"><option>Jet</option><option>Hilo</option><option>Beam</option><option>Jigger</option></select></div>
    <div class="hf"><label>Fecha</label><input type="date" id="h-fecha" style="width:106px" oninput="dibujar()"></div>
    <div class="vsep"></div>
    <div class="hf"><label>STD</label><div id="std-disp">00:00</div></div>
    <div class="vsep"></div>
    <div>
      <button class="btn-sede" onclick="clickSede('Calle 80')">CALLE 80</button>
      <button class="btn-sede" style="margin-bottom:0" onclick="clickSede('Calle 19')">CALLE 19</button>
    </div>
    <div id="sede-tag"></div>
    <div class="hdr-r">
      <button class="hbtn" id="btn-dig" onclick="digitalizar()">🖨 DIGITALIZAR</button>
      <button class="hbtn" id="btn-exp" onclick="exportJPG()">📷 EXPORTAR</button>
    </div>
  </div>
  <div id="lienzo-wrap">
    <svg id="svgC"></svg>
  </div>
  <div id="zoom-ctrl">
    <div class="zbtn" onclick="zoomIn()" title="Zoom +">+</div>
    <div class="zbtn" onclick="zoomOut()" title="Zoom −">−</div>
    <div class="zbtn" onclick="zoomReset()" title="Ajustar" style="font-size:10px">↺</div>
  </div>
  <div id="panel">
    <div class="pg"><span class="plbl">Temp</span><button class="bp bp-tr" onclick="abrirTR()">CIRCULAR / TR</button></div>
    <div class="pg"><span class="plbl">Llenados</span>
      <button class="bp bp-ll" onclick="addLL('W1',30)">W1</button>
      <button class="bp bp-ll" onclick="addLL('W2',50)">W2</button>
      <button class="bp bp-ll" onclick="addLL('W3',50)">W3</button>
      <button class="bp bp-ll" style="background:#1f618d" onclick="addLL('T2',50)">T2</button>
      <button class="bp bp-ll" style="background:#154360" onclick="addLL('T3',50)">T3</button>
      <button class="bp bp-ll" style="background:#117a65" onclick="abrirMX()">Mixto</button>
    </div>
    <div class="pg"><span class="plbl">Vaciados</span>
      <button class="bp bp-vc" onclick="addVC('V1')">V1</button>
      <button class="bp bp-vc" onclick="addVC('V2')">V2</button>
      <button class="bp bp-vc" onclick="addVC('V3')">V3</button>
      <button class="bp bp-vc" style="background:#4d5656" onclick="addVC('T2')">T2</button>
      <button class="bp bp-vc" style="background:#2e4053" onclick="addVC('T3')">T3</button>
      <button class="bp bp-vc" style="background:#7b241c" onclick="addVC('PTAR')">PTAR</button>
    </div>
    <div class="pg"><span class="plbl">Enjuague</span><button class="bp bp-enj" onclick="abrirENJ()">ENJUAGUE</button></div>
    <div class="pg"><span class="plbl">Químicos</span>
      <button class="bp bp-ad" onclick="abrirAD('intro')">+ Introducción</button>
      <button class="bp bp-ds" onclick="abrirAD('dosif')">▾ Dosificación</button>
    </div>
    <div class="pg"><span class="plbl">Operador</span>
      <button class="bp bp-op" onclick="addOp('PH')">PH</button>
      <button class="bp bp-op" onclick="addOp('TONO')">TONO</button>
      <button class="bp bp-op" onclick="addOp('MUESTRA')">MUESTRA</button>
    </div>
    <div class="pg"><span class="plbl">Control</span>
      <button class="bp bp-un" onclick="deshacer()">↩ Deshacer</button>
      <button class="bp bp-rs" onclick="resetear()">RESET</button>
    </div>
  </div>
</div>

<script>
const QUIMICOS=['ACIDO ACETICO','ACIDO FORMICO','AGUA','ALKALI','ANTIESPUMANTE','AUXILIARES','CARBONADO DE SODIO','COLORANTE ACIDO','COLORANTE ALGODÓN','COLORANTE DIRECTO','COLORANTE DISPERSO','COLORANTE OPTICO','COLORANTE POLIESTER','COLORANTE REACTIVO','DETERGENTE','DISPERSANTE','ENZIMA BIOPULIDO','FIJADOR','HIDROSULFITO DE SODIO','IGUALADOR','JABÓN','MATIZADOR','NAPHTALENE','NEUTRALIZADO','PEROXFIN','PEROXIDO DE HIDROGENO','REDUCTOR','SAL','SAL DOSIFICADA','SAL RECIRCULADA','SODA CAUSTICA','SULFATO DE SODIO'];
const QCOL=['#e74c3c','#f39c12','#27ae60','#3498db','#2980b9','#9b59b6','#e67e22','#1abc9c','#e91e63','#16a085','#c0392b','#d35400','#7f8c8d','#2c3e50','#1d8348','#117a65','#154360','#6c3483','#b7950b','#1a5276','#784212','#4a235a','#1b4f72','#0e6251','#7b241c','#515a5a','#1c2833','#a93226','#5d6d7e','#ca6f1e','#8e44ad','#2471a3'];
const TMAX=140,ML={left:60,right:40,top:30,bottom:140},PX_PER_MIN=8,SW=26;
let pasos=[],historia=[],qIdx=0,_sede='',_bodega='',_adTipo='intro',_zoom=1,_tempPos={},_opPos={},_visualOffset=0,_legPos={x:0,y:0};

function dims(){const e=document.getElementById('lienzo-wrap'),r=e.getBoundingClientRect();return{w:Math.max(r.width,480),h:Math.max(r.height,300)};}
function totMin(){const c=getCurva();return c.length>0?c[c.length-1].min:0;}
function totMinReal(){return totMin()-_visualOffset;}
function svgW(){return Math.max(totMin()*PX_PER_MIN+ML.left+ML.right+120, dims().w);}
function tx(m){return ML.left+(m*PX_PER_MIN);}
function ty(t){const{h}=dims();const ph=h-ML.top-ML.bottom;return ML.top+ph-(t/TMAX)*ph;}
function getCurva(){let p=[{min:0,temp:0}];pasos.forEach(s=>p=p.concat(s.puntos));return p;}
function lastP(){const c=getCurva();return c[c.length-1];}
function gH(){historia.push(JSON.parse(JSON.stringify(pasos)));}
function cM(id){document.getElementById(id).classList.remove('open');}
function oM(id){document.getElementById(id).classList.add('open');}
function updSTD(){const m=totMinReal(),hh=String(Math.floor(m/60)).padStart(2,'0'),mm=String(Math.floor(m%60)).padStart(2,'0');document.getElementById('std-disp').textContent=hh+':'+mm;}

function zoomIn(){_zoom=Math.min(_zoom*1.25,3);applyZoom();}
function zoomOut(){_zoom=Math.max(_zoom/1.25,0.5);applyZoom();}
function zoomReset(){_zoom=1;applyZoom();}
function applyZoom(){
  const wrap=document.getElementById('lienzo-wrap');
  const svg=document.getElementById('svgC');
  svg.style.transform='scale('+_zoom+')';
  svg.style.transformOrigin='top left';
  dibujar();
}

window.addEventListener('load',()=>{
  document.getElementById('h-fecha').value=new Date().toISOString().split('T')[0];
  filtQ();
  setTimeout(()=>{dibujar();updSTD();},100);
});
window.addEventListener('resize',()=>{dibujar();});

function clickSede(s){_sede=s;if(s==='Calle 80')oM('mo-sede');else{_bodega='';document.getElementById('sede-tag').textContent='📍 Calle 19';dibujar();}}
function setBodega(b){_bodega=b;cM('mo-sede');document.getElementById('sede-tag').textContent='📍 '+_sede+' · '+b;dibujar();}

function abrirTR(){
  const u=lastP();
  document.getElementById('tr-t').value='';document.getElementById('tr-g').value='';document.getElementById('tr-s').value='0';
  document.getElementById('tr-prv').textContent='Temp actual: '+u.temp+'°C | Min: '+u.min.toFixed(1);
  ['tr-t','tr-g','tr-s'].forEach(id=>document.getElementById(id).oninput=prvTR);
  oM('mo-tr');
}
function prvTR(){
  const u=lastP(),tv=document.getElementById('tr-t').value,td=tv===''?null:parseFloat(tv),gr=parseFloat(document.getElementById('tr-g').value),st=parseFloat(document.getElementById('tr-s').value)||0;
  if(td===null){document.getElementById('tr-prv').textContent='Solo circular: '+st+' min';return;}
  if(!gr)return;
  const tR=(Math.abs(td-u.temp)/gr).toFixed(1);
  document.getElementById('tr-prv').textContent='Rampa: '+tR+'min  Sost: '+st+'min  Total: '+(parseFloat(tR)+st).toFixed(1)+'min';
}
function confTR(){
  const u=lastP(),tv=document.getElementById('tr-t').value,td=tv===''?null:parseFloat(tv),gr=parseFloat(document.getElementById('tr-g').value),st=parseFloat(document.getElementById('tr-s').value)||0;
  if(td!==null&&(!gr||gr<=0)){alert('Gradiente obligatorio si hay temperatura destino.');return;}
  if(td!==null&&(td<0||td>TMAX)){alert('Temperatura fuera de rango 0–140°C.');return;}
  if(td===null&&st<=0){alert('Ingresa al menos el tiempo de circulación.');return;}
  gH();const pts=[];
  if(td!==null){
    const diff=Math.abs(td-u.temp),tR=parseFloat((diff/gr).toFixed(2));
    if(diff>0)pts.push({min:parseFloat((u.min+tR).toFixed(2)),temp:td});
    if(st>0)pts.push({min:parseFloat((u.min+tR+st).toFixed(2)),temp:td});
    if(!pts.length)pts.push({min:u.min,temp:td});
    pasos.push({tipo:'tr',puntos:pts,tR,tS:st,grad:gr,tDest:td,tOrig:u.temp,soloCirc:false});
  } else {
    pts.push({min:parseFloat((u.min+st).toFixed(2)),temp:u.temp});
    pasos.push({tipo:'tr',puntos:pts,tR:0,tS:st,grad:null,tDest:u.temp,tOrig:u.temp,soloCirc:true});
  }
  cM('mo-tr');dibujar();updSTD();
}

function addLL(lbl,temp){gH();const u=lastP();_visualOffset+=2;pasos.push({tipo:'ll',lbl,puntos:[{min:u.min,temp},{min:parseFloat((u.min+5).toFixed(2)),temp}],durMin:3,llTemp:temp});dibujar();updSTD();}
function abrirMX(){oM('mo-mx');}
function confMX(){const a=document.getElementById('mx-a').value,b=document.getElementById('mx-b').value;gH();const u=lastP();_visualOffset+=2;pasos.push({tipo:'ll',lbl:'MX',lblMx:a+'+'+b,puntos:[{min:u.min,temp:42},{min:parseFloat((u.min+5).toFixed(2)),temp:42}],durMin:3,llTemp:42});cM('mo-mx');dibujar();updSTD();}
function addVC(lbl){const u=lastP();gH();_visualOffset+=2;pasos.push({tipo:'vc',lbl,puntos:[{min:u.min,temp:0},{min:parseFloat((u.min+5).toFixed(2)),temp:0}],durMin:3});dibujar();updSTD();}

function abrirENJ(){
  const u=lastP();
  document.getElementById('enj-ti').value=u.temp;document.getElementById('enj-temp').value=0;
  document.getElementById('enj-grad').value=0;document.getElementById('enj-sost').value=0;
  oM('mo-enj');setTimeout(()=>prvENJ(),50);
}
function prvENJ(){
  const llT=document.getElementById('enj-ll').value,llTemps={W1:30,W2:50,W3:50,T2:50,T3:50},llTemp=llTemps[llT]||30;
  const ti=parseFloat(document.getElementById('enj-ti').value)||llTemp,tf=parseFloat(document.getElementById('enj-temp').value)||0;
  const eG=parseFloat(document.getElementById('enj-grad').value)||0,eS=parseFloat(document.getElementById('enj-sost').value)||0;
  let tTotal=eS;if(tf>ti&&eG>0)tTotal+=(tf-ti)/eG;
  const tStr=String(Math.round(tTotal));
  document.getElementById('enj-prv').textContent=`${ti}°C → ${tf>0?tf+'°C':'sin calentar'}  Sost: ${eS}min  Total lavado: ${tStr}min`;
}
function confENJ(){
  const llT=document.getElementById('enj-ll').value,llTemps={W1:30,W2:50,W3:50,T2:50,T3:50},llTemp=llTemps[llT]||30;
  const ti=parseFloat(document.getElementById('enj-ti').value)||llTemp,tf=parseFloat(document.getElementById('enj-temp').value)||0;
  const eG=parseFloat(document.getElementById('enj-grad').value)||0,eS=parseFloat(document.getElementById('enj-sost').value)||0;
  const vcT=document.getElementById('enj-vc').value,u=lastP();gH();const pts=[];let cur=u.min;
  if(eG>0&&tf>0&&tf<ti){
    pts.push({min:parseFloat(cur.toFixed(2)),temp:ti});cur+=(ti-tf)/eG;pts.push({min:parseFloat(cur.toFixed(2)),temp:tf});
    if(eS>0){cur+=eS;pts.push({min:parseFloat(cur.toFixed(2)),temp:tf});}
    pts.push({min:parseFloat(cur.toFixed(2)),temp:0});
  } else {
    pts.push({min:parseFloat(cur.toFixed(2)),temp:llTemp});
    if(eS>0){cur+=eS;pts.push({min:parseFloat(cur.toFixed(2)),temp:llTemp});}
    pts.push({min:parseFloat(cur.toFixed(2)),temp:0});
  }

function dibujar(){

      const onMove=ev=>{
        const x=(ev.clientX-rect.left);
        const y=(ev.clientY-rect.top);

        dibujar();
      };
      const onUp=()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
      window.addEventListener('mousemove',onMove);
      window.addEventListener('mouseup',onUp);
    });
  });
  svg.querySelectorAll('.op-label').forEach(g=>{
    g.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();

        _opPos[key]={dx:curDX+(ev.clientX-startX),dy:curDY+(ev.clientY-startY)};

      window.addEventListener('mousemove',onMove);
      window.addEventListener('mouseup',onUp);
    });
  });
  const legSvg=svg.querySelector('.leg-svg');
  if(legSvg){
    legSvg.addEventListener('mousedown',e=>{
      e.preventDefault();e.stopPropagation();

      };
      const onUp=()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);};
      window.addEventListener('mousemove',onMove);
      window.addEventListener('mouseup',onUp);
    });
  }
}

  const legEl=document.getElementById('leg-mov');
  if(legEl){
    legEl.classList.remove('sel');
    const lx=parseFloat(legEl.style.left)||0,ly=parseFloat(legEl.style.top)||0;
    const lw=legEl.offsetWidth,lhActual=legEl.offsetHeight;
    const items=Array.from(legEl.querySelectorAll('.leg-row'));
    const scale=parseFloat(legEl.dataset.scale)||1;
    const titleH=46*scale,rowH=42*scale,pad=18*scale;
    s+='<rect x="'+lx+'" y="'+ly+'" width="'+lw+'" height="'+lhActual+'" fill="white" fill-opacity=".85" stroke="none" rx="6"/>';
    s+='<text x="'+(lx+lw/2)+'" y="'+(ly+pad+24*scale)+'" text-anchor="middle" font-size="'+(26*scale)+'" font-weight="900" fill="#1a5276" font-family="Arial,sans-serif" letter-spacing="2">QUÍMICOS</text>';
    s+='<line x1="'+(lx+10)+'" y1="'+(ly+pad+36*scale)+'" x2="'+(lx+lw-10)+'" y2="'+(ly+pad+36*scale)+'" stroke="#ddd" stroke-width="2"/>';
    items.forEach((row,i)=>{
      const swEl=row.querySelector('.leg-sw'),txEl=row.querySelector('.leg-tx');
      const col=swEl.style.background||swEl.style.backgroundColor;
      const tx=txEl.textContent;
      const ry=ly+pad+titleH+i*rowH;
      s+='<rect x="'+(lx+pad)+'" y="'+(ry+6*scale)+'" width="'+(38*scale)+'" height="'+(30*scale)+'" rx="3" fill="'+col+'" stroke="#555" stroke-width="1.2"/>';
      s+='<text x="'+(lx+pad+50*scale)+'" y="'+(ry+28*scale)+'" font-size="'+(24*scale)+'" font-weight="bold" fill="#111" font-family="Arial,sans-serif">'+tx.replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))+'</text>';
    });
  }
  s+='<line x1="'+PAD+'" y1="'+(h-PAD-FOOTER_H)+'" x2="'+(w-PAD)+'" y2="'+(h-PAD-FOOTER_H)+'" stroke="#333" stroke-width="1.5"/>';
  s+='<text x="'+(PAD+40)+'" y="'+(h-PAD-FOOTER_H/2-5)+'" font-size="44" font-weight="900" fill="#111" letter-spacing="2" font-family="Arial,sans-serif">VERSIÓN: ${ver}</text>';
  s+='<text x="'+(PAD+40)+'" y="'+(h-PAD-FOOTER_H/2+45)+'" font-size="30" fill="#444" font-weight="bold" font-family="Arial,sans-serif">N° ${num} · ${sedeTxt} · ${tipo.toUpperCase()}</text>';
  s+='<line x1="'+(PAD+700)+'" y1="'+(h-PAD-FOOTER_H+10)+'" x2="'+(PAD+700)+'" y2="'+(h-PAD-10)+'" stroke="#aaa"/>';
  const fy=h-PAD-FOOTER_H/2+30;
  s+='<text x="'+(w/2)+'" y="'+fy+'" text-anchor="middle" font-size="108" font-weight="bold" fill="#1a5276" font-family="Brush Script MT, cursive" font-style="italic" letter-spacing="4">Curva ${num} ${tipo}</text>';
  s+='<line x1="'+(w-PAD-480)+'" y1="'+(h-PAD-FOOTER_H+10)+'" x2="'+(w-PAD-480)+'" y2="'+(h-PAD-10)+'" stroke="#aaa"/>';
  s+='<text x="'+(w-PAD-240)+'" y="'+(h-PAD-FOOTER_H/2-15)+'" text-anchor="middle" font-size="36" font-weight="900" fill="#333" letter-spacing="3" font-family="Arial,sans-serif">STD</text>';
  s+='<text x="'+(w-PAD-240)+'" y="'+(h-PAD-FOOTER_H/2+45)+'" text-anchor="middle" font-size="68" font-weight="bold" fill="#c0392b" font-family="monospace">${stdTxt}</text>';
  s+='</svg>';
  const maxArea=50000000;
  const maxDim=14000;
  let sc=2;
  while((w*sc*h*sc>maxArea||w*sc>maxDim||h*sc>maxDim)&&sc>0.6){sc-=0.1;}
  sc=Math.max(sc,1.2);
  const c=document.createElement('canvas');c.width=Math.floor(w*sc);c.height=Math.floor(h*sc);
  const ctx=c.getContext('2d');ctx.scale(sc,sc);ctx.fillStyle='white';ctx.fillRect(0,0,w,h);
  const logoImg=new Image();logoImg.src=LOGO;
  await new Promise((res)=>{logoImg.onload=res;logoImg.onerror=res;});
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>{
    ctx.drawImage(img,0,0,w,h);
    try{
      const maxLW=580,maxLH=HEADER_H-30;
      const ar=logoImg.naturalWidth/logoImg.naturalHeight||1.8;
      let lw=maxLW,lh=lw/ar;
      if(lh>maxLH){lh=maxLH;lw=lh*ar;}
      const lx=PAD+10+(maxLW-lw)/2,ly=PAD+10+(maxLH-lh)/2;
      ctx.drawImage(logoImg,lx,ly,lw,lh);
    }catch(e){console.error(e);}
    const a=document.createElement('a');a.download='${filePrefix}.'+(fmt==='jpeg'?'jpg':fmt);
    try{a.href=c.toDataURL('image/'+fmt,.95);a.click();}catch(e){alert('Error al guardar: '+e.message);}
  };
  img.onerror=(e)=>{
    let msg='Error renderizando SVG.\\n\\n';
    msg+='Tamaño página: '+w+'×'+h+'\\n';
    msg+='Canvas final: '+c.width+'×'+c.height+'\\n';
    msg+='SVG bytes: '+s.length+'\\n\\n';
    msg+='Probables causas:\\n';
    msg+='- Imagen muy grande para el navegador\\n';
    msg+='- Caracter especial en el nombre o químicos\\n\\n';
    msg+='Intenta: reducir el tamaño de la curva o quitar caracteres especiales (°, ñ, tildes).';
    alert(msg);
    console.error('SVG export error',e);console.log('SVG content:',s.substring(0,500));
  };
  const blob=new Blob([s],{type:'image/svg+xml;charset=utf-8'});img.src=URL.createObjectURL(blob);
 }catch(e){alert('Error en exportación: '+e.message);console.error(e);}
}
<\/scr`+`ipt></body></html>`);
}

function exportJPG(){
  const svg=document.getElementById('svgC').cloneNode(true);
  const w=svgW(),h=dims().h;
  svg.setAttribute('viewBox',`0 0 ${w} ${h}`);
  const s=new XMLSerializer().serializeToString(svg);
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const ctx=c.getContext('2d');ctx.fillStyle='white';ctx.fillRect(0,0,c.width,c.height);
  const num=document.getElementById('h-num').value||'curva';
  const tipo=document.getElementById('h-tipo').value;
  const img=new Image(),blob=new Blob([s],{type:'image/svg+xml'}),url=URL.createObjectURL(blob);
  img.onload=()=>{ctx.drawImage(img,0,0,w,h);const a=document.createElement('a');a.download=num.replace(/\s+/g,'_')+'.jpg';a.href=c.toDataURL('image/jpeg',.95);a.click();URL.revokeObjectURL(url);};
  img.src=url;
}
